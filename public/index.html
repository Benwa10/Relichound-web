<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relic Hound</title>
    <meta name="description" content="Relic Hound — share and track your finds." />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 32px; line-height: 1.4; }
      .wrap { max-width: 720px; margin: 0 auto; }
      .card { border: 1px solid #e5e5e5; border-radius: 14px; padding: 20px; }
      h1 { margin: 0 0 8px; }
      p { margin: 10px 0; }
      .btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
      a.btn { display: inline-block; padding: 12px 16px; border-radius: 12px; text-decoration: none; border: 1px solid #111; }
      a.primary { background: #111; color: #fff; }
      a.secondary { color: #111; }
      .small { font-size: 14px; color: #555; margin-top: 12px; }
      code { background: #f6f6f6; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Relic Hound</h1>
        <p>Track and share your finds. If you have the app installed, shared links will open directly in the app.</p>

        <div class="btns">
          <!-- TODO: replace APP_STORE_LINK with your real App Store URL once it exists -->
          <a class="btn primary" href="APP_STORE_LINK">Download on the App Store</a>

          <!-- This is just a quick link to test your universal links -->
          <a class="btn secondary" href="/i/test">Test a Relic Hound link</a>
        </div>

        <p class="small">
          Tip: once your App Store page is live, replace <code>APP_STORE_LINK</code> above with the real URL.
        </p>
      </div>
    </div>
  </body>
</html>
